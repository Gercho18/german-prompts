[build]
  publish = "."

[[edge_functions]]
  path = "/prompt/*"
  function = "prompt"

[[redirects]]
  from = "/prompt/*"
  to = "/"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
